<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580" role="img">
  <title>Sam Duncan — Terminal Bracket Logo</title>
  <desc>Terminal bracket logo mark for Sam Duncan, DevOps Engineer</desc>

  <defs>
    <linearGradient id="teal-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#3d8bff"/>
    </linearGradient>
    <linearGradient id="teal-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#3d8bff"/>
    </linearGradient>
    <style>
      .label { font-family: 'Courier New', Courier, monospace; fill: #6b7280; font-size: 11px; }
      .name-lg { font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: 700; fill: #e8eaf0; letter-spacing: 3px; }
      .role-sm { font-family: 'Courier New', Courier, monospace; font-size: 10px; fill: #3d8bff; letter-spacing: 4px; }
      .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="580" fill="#111318"/>

  <!-- subtle divider lines -->
  <line x1="40" y1="374" x2="640" y2="374" stroke="#1e2432" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════════
       PRIMARY MARK — large centered
  ═══════════════════════════════════════════ -->

  <text class="label" x="340" y="32" text-anchor="middle">Primary mark</text>

  <!-- card -->
  <rect x="220" y="46" width="240" height="240" rx="18" fill="#0a0c10" stroke="#1e2432" stroke-width="1.5"/>

  <!-- left bracket -->
  <path d="M 296 88 L 272 88 L 272 234 L 296 234"
    fill="none" stroke="#00d4aa" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- right bracket -->
  <path d="M 364 88 L 388 88 L 388 234 L 364 234"
    fill="none" stroke="#00d4aa" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- SD monogram -->
  <text class="mono" font-size="80" font-weight="700"
    fill="url(#teal-h)"
    x="330" y="178" text-anchor="middle" dominant-baseline="central">SD</text>

  <!-- blinking cursor (animated) -->
  <rect x="372" y="198" width="13" height="18" rx="2" fill="#00d4aa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- wordmark beneath -->
  <text class="mono" font-size="18" font-weight="700"
    fill="#e8eaf0" x="330" y="318" text-anchor="middle" letter-spacing="3">SAM DUNCAN</text>
  <text class="mono" font-size="10" fill="#3d8bff"
    x="330" y="338" text-anchor="middle" letter-spacing="4">DEVOPS ENGINEER</text>
  <rect x="220" y="348" width="220" height="2" rx="1" fill="url(#teal-h)" opacity="0.8"/>

  <!-- ═══════════════════════════════════════════
       HORIZONTAL LOCKUP
  ═══════════════════════════════════════════ -->

  <text class="label" x="340" y="398" text-anchor="middle">Horizontal lockup</text>

  <rect x="60" y="412" width="560" height="96" rx="12" fill="#0a0c10" stroke="#1e2432" stroke-width="1"/>

  <!-- mini bracket -->
  <path d="M 110 434 L 98 434 L 98 488 L 110 488"
    fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 162 434 L 174 434 L 174 488 L 162 488"
    fill="none" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="mono" font-size="38" font-weight="700"
    fill="url(#teal-h)" x="136" y="464" text-anchor="middle" dominant-baseline="central">SD</text>
  <!-- cursor -->
  <rect x="163" y="473" width="7" height="10" rx="1" fill="#00d4aa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- divider -->
  <line x1="200" y1="426" x2="200" y2="498" stroke="#1e2432" stroke-width="1.5"/>

  <!-- name + role -->
  <text class="mono" font-size="22" font-weight="700"
    fill="#e8eaf0" x="222" y="452" dominant-baseline="central" letter-spacing="1.5">SAM DUNCAN</text>
  <text class="mono" font-size="10" fill="#3d8bff"
    x="222" y="476" dominant-baseline="central" letter-spacing="3">DEVOPS · CLOUD · IaC</text>

  <!-- .com chip -->
  <rect x="492" y="446" width="100" height="26" rx="5" fill="#111827" stroke="#00d4aa" stroke-width="0.8"/>
  <text class="mono" font-size="10.5" fill="#00d4aa"
    x="542" y="459" text-anchor="middle" dominant-baseline="central" letter-spacing="1.5">sdpuncan.com</text>

  <!-- accent bar -->
  <rect x="60" y="504" width="560" height="2" rx="1" fill="url(#teal-h)" opacity="0.8"/>

  <!-- ═══════════════════════════════════════════
       FAVICON SIZES
  ═══════════════════════════════════════════ -->

  <text class="label" x="340" y="534" text-anchor="middle">Favicon sizes</text>

  <!-- 48px -->
  <rect x="176" y="548" width="48" height="48" rx="8" fill="#0a0c10" stroke="#1e2432" stroke-width="1"/>
  <path d="M 190 558 L 184 558 L 184 586 L 190 586" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <path d="M 210 558 L 216 558 L 216 586 L 210 586" fill="none" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
  <text class="mono" font-size="18" font-weight="700" fill="#00d4aa"
    x="200" y="573" text-anchor="middle" dominant-baseline="central">SD</text>

  <!-- 32px -->
  <rect x="252" y="556" width="32" height="32" rx="6" fill="#0a0c10" stroke="#1e2432" stroke-width="1"/>
  <path d="M 261 563 L 256 563 L 256 580 L 261 580" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 275 563 L 280 563 L 280 580 L 275 580" fill="none" stroke="#00d4aa" stroke-width="1.5" stroke-linecap="round"/>
  <text class="mono" font-size="12" font-weight="700" fill="#00d4aa"
    x="268" y="572" text-anchor="middle" dominant-baseline="central">SD</text>

  <!-- 16px -->
  <rect x="312" y="562" width="22" height="22" rx="4" fill="#0a0c10" stroke="#1e2432" stroke-width="1"/>
  <text class="mono" font-size="9" font-weight="700" fill="#00d4aa"
    x="323" y="573" text-anchor="middle" dominant-baseline="central">SD</text>

  <!-- light bg variant -->
  <text class="label" x="460" y="548" text-anchor="middle">Light bg variant</text>
  <rect x="396" y="556" width="128" height="34" rx="6" fill="#f0f4f8" stroke="#d0d8e4" stroke-width="1"/>
  <path d="M 414 564 L 408 564 L 408 580 L 414 580" fill="none" stroke="#0f6e56" stroke-width="2" stroke-linecap="round"/>
  <path d="M 436 564 L 442 564 L 442 580 L 436 580" fill="none" stroke="#0f6e56" stroke-width="2" stroke-linecap="round"/>
  <text class="mono" font-size="14" font-weight="700" fill="#0f6e56"
    x="425" y="572" text-anchor="middle" dominant-baseline="central">SD</text>
  <line x1="452" y1="564" x2="452" y2="580" stroke="#d0d8e4" stroke-width="1"/>
  <text class="mono" font-size="9.5" font-weight="700" fill="#185fa5"
    x="468" y="572" text-anchor="middle" dominant-baseline="central" letter-spacing="0.5">SAM DUNCAN</text>

</svg>
